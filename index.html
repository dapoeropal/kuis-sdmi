<body class="transition-colors duration-500">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const apiKey = ""; 

    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    function pcmToWav(pcmData, sampleRate) {
        const numChannels = 1;
        const bytesPerSample = 2;
        const blockAlign = numChannels * bytesPerSample;
        const byteRate = sampleRate * blockAlign;
        const dataSize = pcmData.byteLength;

        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bytesPerSample * 8, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);

        const pcmArray = new Uint8Array(pcmData);
        const outArray = new Uint8Array(buffer, 44);
        outArray.set(pcmArray);

        return buffer;
    }

    function App() {
      // --- STATE UTAMA ---
      const [theme, setTheme] = useState('light'); 
      const [gameState, setGameState] = useState('config'); 
      
      const [manualKey, setManualKey] = useState(() => {
        return localStorage.getItem('gemini_api_key') || "";
      });

      const [config, setConfig] = useState({ 
        grade: 'TK / PAUD', 
        term: 'Tengah Semester 2', 
        subject: 'Mengenal Angka & Berhitung',
        level: 'Campuran',
        questionCount: 10,
        voice: 'Kore', // Setel default ke Kakak Ceria karena paling disukai
        visualMode: true, 
        specialNote: "" 
      });

      const [uploadedFiles, setUploadedFiles] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      
      const [answers, setAnswers] = useState({}); 
      const [feedbackMessages, setFeedbackMessages] = useState({});
      
      const [loadingText, setLoadingText] = useState("Menyiapkan misi belajarmu...");
      const [countdown, setCountdown] = useState(25); 
      const [errorMessage, setErrorMessage] = useState("");
      
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [isTtsLoading, setIsTtsLoading] = useState(false);
      const [preloadedAudioUrl, setPreloadedAudioUrl] = useState(null);
      
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [chatMessages, setChatMessages] = useState([]);
      const [chatInput, setChatInput] = useState("");
      const [isChatLoading, setIsChatLoading] = useState(false);

      const [isKeyModalOpen, setIsKeyModalOpen] = useState(false); 
      const [tempKeyInput, setTempKeyInput] = useState(""); 

      const [showHint, setShowHint] = useState(false);

      const audioRef = useRef(new Audio());
      const abortControllerRef = useRef(null); 
      const fileInputRef = useRef(null);
      const chatEndRef = useRef(null);

      // --- VARIABEL DERIVAT ---
      const isDark = theme === 'dark';
      const bgMain = isDark ? "bg-slate-900" : "bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100";
      const cardBg = isDark ? "bg-slate-800 border-slate-600" : "bg-white/80 backdrop-blur-xl border-white";
      const textMain = isDark ? "text-white" : "text-gray-800";
      const textSub = isDark ? "text-gray-300" : "text-gray-600";
      const inputBg = isDark ? "bg-slate-700 border-slate-600 text-white" : "bg-white border-gray-200 text-gray-700";

      const activeKey = manualKey.trim() !== "" ? manualKey.trim() : apiKey;
      const currentQ = questions.length > 0 ? questions[currentQuestionIndex] : null;
      
      const isAnswered = answers[currentQuestionIndex] !== undefined;
      const selectedOption = isAnswered ? answers[currentQuestionIndex] : null;
      const isCorrectAnswer = isAnswered && currentQ && selectedOption === currentQ.correctAnswerIndex;
      const feedbackMessage = isAnswered ? feedbackMessages[currentQuestionIndex] : "";
      
      const showVoiceFeature = ['TK / PAUD', '1', '2', '3'].includes(config.grade);

      const levelColors = { 
        'Mudah': isDark ? 'bg-green-900 text-green-300' : 'bg-green-100 text-green-700', 
        'Sedang': isDark ? 'bg-yellow-900 text-yellow-300' : 'bg-yellow-100 text-yellow-700', 
        'Sulit': isDark ? 'bg-red-900 text-red-300' : 'bg-rose-100 text-rose-700'
      };

      const grades = ['TK / PAUD', '1', '2', '3', '4', '5', '6'];
      const terms = ['Semester 1', 'Tengah Semester 1', 'Semester 2', 'Tengah Semester 2', 'Latihan Biasa'];
      const levels = ['Campuran', 'Mudah', 'Sedang', 'Sulit'];
      const questionCounts = [10, 15, 20, 25, 30, 40, 50];
      
      // Menambahkan Label Rekomendasi Favorit Anak-anak
      const voices = [
        { id: 'Kore', name: '👧 Kakak Ceria (Premium) ⭐ Favorit' },
        { id: 'Puck', name: '🤖 Robot Pintar (Premium) ⭐ Favorit' },
        { id: 'Aoede', name: '🧚‍♀️ Ibu Peri (Premium)' },
        { id: 'Fenrir', name: '🐻 Paman Beruang (Premium)' },
        { id: 'local', name: '📱 Suara Robot HP (Tanpa Kuota)' }
      ];
      
      const subjects = [
        'Mengenal Angka & Berhitung', 'Mengenal Huruf & Membaca', 'Mengenal Hewan & Tumbuhan', 'Mengenal Warna & Bentuk',
        'Bahasa Indonesia', 'Matematika', 'Bahasa Inggris', 'Pendidikan Pancasila', 'IPAS',
        'Kemuhammadiyahan (KMD)', "Al Qur'an", 'Seni Budaya', 'Bahasa Jawa', 
        "Baca Tulis Al-Qur'an (BTA)", 'Sejarah Kebudayaan Islam (SKI)', 
        'Aqidah', 'Fiqih', 'Bahasa Arab', 'PJOK', 'Coding'
      ];
      
      const praiseWords = ["Hebat Banget! 🌟", "Kamu Jenius! 🧠", "Luar Biasa! 🎉", "Tepat Sekali! 🏆", "Wah, Keren! ✨", "Pintar Sekali! 🏅"];
      const encourageWords = ["Hampir Benar! 😅", "Jangan Menyerah! 💪", "Ayo Coba Lagi! 🚀", "Tetap Semangat! ❤️", "Belajar Lagi Yuk! 💡", "Sedikit Lagi Tepat! 🎯"];

      useEffect(() => {
        if (theme === 'dark') document.body.classList.add('bg-slate-900');
        else document.body.classList.remove('bg-slate-900');
      }, [theme]);

      useEffect(() => {
        if (gameState === 'loading') {
          setCountdown(25); 
          const timerInterval = setInterval(() => {
            setCountdown((prev) => (prev <= 1 ? 1 : prev - 1)); 
          }, 1000);
          const texts = [
            "Memanggil pesawat luar angkasa...",
            uploadedFiles.length > 0 ? "Membaca dokumen materimu..." : "Mencari materi kurikulum terbaru...",
            config.specialNote ? "Membaca pesan khusus darimu..." : "Meracik soal-soal seru...",
            "Mengacak letak jawaban...",
            showVoiceFeature ? "Menyiapkan asisten suara AI..." : "Menyiapkan lembar ujian...",
            "Hampir siap, meluncurrrr! 🚀"
          ];
          let i = 0;
          const textInterval = setInterval(() => {
            i = (i + 1) % texts.length;
            setLoadingText(texts[i]);
          }, 3000);
          return () => { clearInterval(timerInterval); clearInterval(textInterval); };
        }
      }, [gameState, uploadedFiles.length, config.specialNote, showVoiceFeature]);

      useEffect(() => {
        if (isChatOpen && chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [chatMessages, isChatOpen]);

      useEffect(() => {
        if (gameState === 'playing' && questions.length > 0 && selectedOption === null && showVoiceFeature && !isChatOpen && config.voice !== 'local') {
            preloadCurrentQuestionAudio();
        }
        stopSpeaking();
      }, [currentQuestionIndex, gameState, questions, config.voice, showVoiceFeature, isChatOpen]);

      useEffect(() => {
          const audioEl = audioRef.current;
          const handleEnded = () => setIsSpeaking(false);
          audioEl.addEventListener('ended', handleEnded);
          return () => audioEl.removeEventListener('ended', handleEnded);
      }, []);

      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

      const backToHome = () => {
        stopSpeaking();
        setGameState('config');
        setQuestions([]);
        setCurrentQuestionIndex(0);
        setScore(0);
        setAnswers({});
        setFeedbackMessages({});
        setPreloadedAudioUrl(null);
        setIsChatOpen(false);
        setChatMessages([]);
        setShowHint(false);
      };

      const stopSpeaking = () => {
        audioRef.current.pause();
        audioRef.current.currentTime = 0;
        if (window.speechSynthesis) window.speechSynthesis.cancel(); 
        setIsSpeaking(false);
      };

      const cleanOptionText = (text) => {
        if (!text) return "";
        let cleanedText = String(text).trim();
        cleanedText = cleanedText.replace(/^([a-dA-D][\.\)]\s*)+/i, '');
        return cleanedText;
      };

      const formatText = (text) => {
        if (!text) return null;
        const str = String(text);
        const parts = str.split(/(\*\*.*?\*\*)/g);
        
        return parts.map((part, index) => {
            if (part.startsWith('**') && part.endsWith('**')) {
                return <strong key={index} className="font-bold text-indigo-600 dark:text-indigo-400">{part.substring(2, part.length - 2)}</strong>;
            }
            return (
                <span key={index}>
                    {part.split('\n').map((item, i, arr) => (
                        <React.Fragment key={i}>
                            {item}
                            {i !== arr.length - 1 && <br />}
                        </React.Fragment>
                    ))}
                </span>
            );
        });
      };

      const fallbackTTS = () => {
          if (!currentQ) return;
          if (window.speechSynthesis) window.speechSynthesis.cancel(); 
          setIsSpeaking(true);
          
          let cleanQ = String(currentQ.question).replace(/[_]/g, 'titik titik'); 
          cleanQ = cleanQ.replace(/\*\*/g, '');

          const textToRead = `${cleanQ}. A. ${cleanOptionText(currentQ.options[0]).replace(/\*\*/g, '')}. B. ${cleanOptionText(currentQ.options[1]).replace(/\*\*/g, '')}. C. ${cleanOptionText(currentQ.options[2]).replace(/\*\*/g, '')}. D. ${cleanOptionText(currentQ.options[3]).replace(/\*\*/g, '')}.`;
          
          const utterance = new SpeechSynthesisUtterance(textToRead);
          utterance.lang = 'id-ID';
          utterance.rate = 0.9;
          utterance.onend = () => setIsSpeaking(false);
          utterance.onerror = () => setIsSpeaking(false);
          
          if (window.speechSynthesis) window.speechSynthesis.speak(utterance);
      };

      const preloadCurrentQuestionAudio = async () => {
          if (!currentQ || !activeKey.trim() || config.voice === 'local') return; 
          
          setIsTtsLoading(true);
          
          setPreloadedAudioUrl(prevUrl => {
              if (prevUrl) URL.revokeObjectURL(prevUrl);
              return null;
          });

          if (abortControllerRef.current) {
              abortControllerRef.current.abort();
          }
          abortControllerRef.current = new AbortController();
          const signal = abortControllerRef.current.signal;

          try {
              let cleanQ = String(currentQ.question).replace(/[_]/g, 'titik titik').replace(/\*\*/g, ''); 
              
              let voiceActingPrompt = "";
              if (config.voice === 'Fenrir') voiceActingPrompt = "Bacakan dengan suara paman beruang yang ramah: ";
              else if (config.voice === 'Puck') voiceActingPrompt = "Bacakan dengan suara robot pintar yang ceria: ";
              else if (config.voice === 'Kore') voiceActingPrompt = "Bacakan dengan suara kakak perempuan yang ceria: ";
              else voiceActingPrompt = "Bacakan dengan suara ibu peri yang lembut: ";

              const textToRead = `${voiceActingPrompt} ${cleanQ}. A. ${cleanOptionText(currentQ.options[0]).replace(/\*\*/g, '')}. B. ${cleanOptionText(currentQ.options[1]).replace(/\*\*/g, '')}. C. ${cleanOptionText(currentQ.options[2]).replace(/\*\*/g, '')}. D. ${cleanOptionText(currentQ.options[3]).replace(/\*\*/g, '')}.`;

              const payload = {
                contents: [{ parts: [{ text: textToRead }] }],
                generationConfig: {
                  responseModalities: ["AUDIO"],
                  speechConfig: {
                    voiceConfig: { prebuiltVoiceConfig: { voiceName: config.voice } } 
                  }
                },
                model: "gemini-2.5-flash-preview-tts"
              };

              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${activeKey}`;
              
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: signal
              });

              if (!res.ok) {
                  throw new Error(`Gagal preload suara (Status: ${res.status}).`);
              }

              const data = await res.json();
              const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;

              if (audioData && audioData.data) {
                const sampleRateMatch = audioData.mimeType.match(/rate=(\d+)/);
                const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000;
                
                const pcmBuffer = base64ToArrayBuffer(audioData.data);
                const wavBuffer = pcmToWav(pcmBuffer, sampleRate);
                
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(blob);

                setPreloadedAudioUrl(audioUrl);
                setIsTtsLoading(false);
              } else {
                 throw new Error("Data suara kosong dari server.");
              }
          } catch (err) {
              if (err.name === 'AbortError') {
                  console.log("Fetch suara dibatalkan.");
              } else {
                  console.warn("Preload audio gagal. Suara cadangan siap digunakan.", err);
                  setIsTtsLoading(false);
              }
          }
      };

      const playPreloadedAudio = () => {
          if (isSpeaking) return;
          
          if (config.voice === 'local') {
              fallbackTTS();
              return;
          }

          if (preloadedAudioUrl) {
              audioRef.current.src = preloadedAudioUrl;
              audioRef.current.play().then(() => {
                  setIsSpeaking(true);
              }).catch(e => {
                  console.error("Gagal memutar audio, mengalihkan ke suara cadangan:", e);
                  fallbackTTS();
              });
          } else {
              fallbackTTS();
          }
      };

      const playSoundEffect = (isCorrect) => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          const ctx = new AudioContext();
          if (isCorrect) {
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'sine';
              osc.frequency.value = freq;
              const startTime = ctx.currentTime + (i * 0.1);
              gain.gain.setValueAtTime(0, startTime);
              gain.gain.linearRampToValueAtTime(0.1, startTime + 0.02);
              gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
              osc.start(startTime);
              osc.stop(startTime + 0.15);
            });
          } else {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.4);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.4);
          }
        } catch (e) {
          console.log("Efek suara diblokir browser.");
        }
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        if (files.length + uploadedFiles.length > 5) {
          alert("Maksimal 5 file saja ya Bolo!");
          return;
        }
        files.forEach(file => {
          if (file.size > 50 * 1024 * 1024) {
            alert(`Ukuran file ${file.name} terlalu besar! Maksimal 50MB.`);
            return;
          }
          const isPdf = file.type === 'application/pdf';
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64String = reader.result.split(',')[1];
            setUploadedFiles(prev => [...prev, { name: file.name, mimeType: file.type, data: base64String, previewUrl: isPdf ? null : reader.result, isPdf: isPdf }]);
          };
          reader.readAsDataURL(file);
        });
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const removeFile = (indexToRemove) => {
        setUploadedFiles(prev => prev.filter((_, index) => index !== indexToRemove));
      };

      const fetchQuestions = async () => {
        if (!activeKey.trim()) {
            alert("Halo Bolo! Jangan lupa masukkan API Key Gemini kamu dulu di kolom yang tersedia sebelum memulai ya!");
            return;
        }

        setGameState('loading');
        setErrorMessage("");
        setShowHint(false);
        setAnswers({});
        setFeedbackMessages({});

        const targetCount = config.questionCount;
        const targetLevel = config.level;
        const isTK = config.grade === 'TK / PAUD';
        
        let levelPrompt = targetLevel === 'Campuran' 
            ? "Variasikan tingkat kesulitan (Mudah, Sedang, Sulit)" 
            : `Semua soal harus memiliki tingkat kesulitan ${targetLevel.toUpperCase()}`;

        let visualPrompt = config.visualMode 
            ? "MODE VISUAL AKTIF: Wajib gunakan EMOJI, IKON, atau SUSUNAN TEKS KREATIF untuk merepresentasikan soal (misalnya: 🍎 + 🍎 = ?)." 
            : "";

        let notePrompt = config.specialNote.trim() !== "" 
            ? `INSTRUKSI KHUSUS DARI PENGGUNA (SANGAT PENTING): "${config.specialNote}".` 
            : "";

        const tingkatSekolahStr = isTK ? 'TK / PAUD' : `SD/MI Kelas ${config.grade}`;

        const promptText = `Buat ${targetCount} soal pilihan ganda untuk anak ${tingkatSekolahStr} ujian ${config.term} mata pelajaran ${config.subject}.
        Tingkat Kesulitan: ${levelPrompt}.
        ${visualPrompt}
        ${isTK ? 'PENTING: Soal untuk anak TK/PAUD harus SANGAT SEDERHANA, gunakan banyak EMOJI, bahasa yang sangat ceria, dan berhubungan dengan kehidupan sehari-hari (hewan, buah, warna, menghitung benda).' : ''}
        
        ${uploadedFiles.length > 0
          ? "SANGAT PENTING: Gunakan informasi dari GAMBAR/DOKUMEN PDF YANG DILAMPIRKAN sebagai acuan utama pembuatan soal." 
          : "Sumber: Kurikulum Merdeka / Kemenag terbaru Indonesia."}

        ${notePrompt}

        ATURAN MUTLAK:
        - Output WAJIB berupa JSON murni.
        - Format: { "questions": [{"question": "...", "options": ["...", "...", "...", "..."], "correctAnswerIndex": 0, "explanation": "...", "hint": "...", "level": "..."}] }
        - Sediakan tepat 4 Pilihan Jawaban (A, B, C, D) dalam array. Pilihan jawaban ORA entuk diwiwiti nganggo huruf "A.", "B.", "C.", "D.". Cukup tulisake teks jawabane wae.
        - "hint" berisi 1 kalimat petunjuk/kisi-kisi rahasia untuk membantu anak menjawab tanpa memberikan jawaban langsung. Gunakan **teks tebal** di kalimat penting jika perlu.
        - Bahasa ramah anak, ceria.
        - Penjelasan singkat & edukatif. Gunakan **teks tebal** di bagian penting jika perlu.`;

        const parts = [{ text: promptText }];
        uploadedFiles.forEach(file => {
          parts.push({ inlineData: { mimeType: file.mimeType, data: file.data } });
        });

        const payload = {
          contents: [{ parts: parts }],
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                questions: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      question: { type: "STRING" },
                      options: { type: "ARRAY", items: { type: "STRING" } },
                      correctAnswerIndex: { type: "INTEGER" },
                      explanation: { type: "STRING" },
                      hint: { type: "STRING" },
                      level: { type: "STRING" },
                      subject: { type: "STRING" }
                    },
                    required: ["question", "options", "correctAnswerIndex", "explanation", "hint", "level", "subject"]
                  }
                }
              },
              required: ["questions"]
            }
          },
          systemInstruction: {
            parts: [{ text: `Kamu adalah guru ${tingkatSekolahStr} Indonesia yang kreatif dan ceria.` }]
          }
        };
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
            
        let responseData = null;
        let lastErrorMsg = "";

        const delays = [1000, 2000, 4000, 8000, 16000];
        let attempt = 0;

        while (attempt < 5) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    if (res.status === 400 || res.status === 401 || res.status === 403) {
                         if (err?.error?.message?.includes('too large') || err?.error?.message?.includes('exceeds')) {
                             throw new Error("Materi PDF yang diunggah terlalu besar/tebal untuk dibaca sekaligus oleh AI. Mohon gunakan file PDF yang lebih kecil atau potong halamannya.");
                         }
                         throw new Error("Akses Ditolak (Error 401). Pastikan API Key diisi dengan benar.");
                    }
                    throw new Error(err?.error?.message || `Gagal menghubungi server (Status: ${res.status})`);
                }
                responseData = await res.json();
                break; 
            } catch (e) {
                lastErrorMsg = e.message;
                if (lastErrorMsg.includes("Akses Ditolak") || lastErrorMsg.includes("terlalu besar/tebal") || lastErrorMsg.includes("is not found")) break;
                
                attempt++;
                if (attempt < 5) {
                    await new Promise(r => setTimeout(r, delays[attempt - 1]));
                }
            }
        }

        try {
          if (!responseData) throw new Error(lastErrorMsg || "Gagal membuat soal. Periksa koneksi internet Anda.");

          const textResponse = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!textResponse) throw new Error("Balasan dari robot AI kosong.");
          
          let cleanJson = textResponse;
          if (cleanJson.startsWith('```json')) cleanJson = cleanJson.substring(7);
          else if (cleanJson.startsWith('```')) cleanJson = cleanJson.substring(3);
          if (cleanJson.endsWith('```')) cleanJson = cleanJson.substring(0, cleanJson.length - 3);
          
          const parsedData = JSON.parse(cleanJson.trim());
          
          if (parsedData.questions && parsedData.questions.length > 0) {
            
            parsedData.questions.forEach(q => {
                if(q.options && q.options.length > 0 && typeof q.correctAnswerIndex === 'number') {
                    const correctAnswerText = q.options[q.correctAnswerIndex];
                    for (let i = q.options.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
                    }
                    q.correctAnswerIndex = q.options.indexOf(correctAnswerText);
                }
            });

            setQuestions(parsedData.questions);
            setCurrentQuestionIndex(0);
            setScore(0);
            setGameState('playing');
          } else {
             throw new Error("Daftar soal kosong.");
          }
        } catch (error) {
          setErrorMessage(error.message);
          setGameState('error');
        }
      };

      const handleOptionClick = (index) => {
        if (isAnswered || !currentQ) return;
        
        stopSpeaking(); 
        const isCorrect = index === currentQ.correctAnswerIndex;
        
        playSoundEffect(isCorrect);
        
        const feedbackWord = isCorrect 
            ? praiseWords[Math.floor(Math.random() * praiseWords.length)] 
            : encourageWords[Math.floor(Math.random() * encourageWords.length)];
            
        setAnswers(prev => ({ ...prev, [currentQuestionIndex]: index }));
        setFeedbackMessages(prev => ({ ...prev, [currentQuestionIndex]: feedbackWord }));
        
        if (isCorrect) {
          setScore(prev => prev + 1);
        }
      };

      const handleNextQuestion = () => {
        stopSpeaking();
        if (currentQuestionIndex < questions.length - 1) {
          setCurrentQuestionIndex(prev => prev + 1);
          setIsChatOpen(false);
          setChatMessages([]);
          setShowHint(false); 
        } else {
          setGameState('result');
          setIsChatOpen(false);
        }
      };

      const handlePrevQuestion = () => {
        if (currentQuestionIndex > 0) {

      const handleAskAI = async () => {
        if (!chatInput.trim() || !currentQ || !activeKey.trim()) return;

        const correctAnswerText = String(currentQ.options[currentQ.correctAnswerIndex]);
        const tingkatSekolahStr = config.grade === 'TK / PAUD' ? 'TK / PAUD' : `SD/MI Kelas ${config.grade}`;

        const newMessages = [...chatMessages, { role: "user", text: chatInput }];
        setChatMessages(newMessages);
        setChatInput("");
        setIsChatLoading(true);

        const promptText = `
        Saya adalah anak ${tingkatSekolahStr}.
        Saya sedang mengerjakan soal Kuis ${config.subject}.
        Pertanyaannya: "${currentQ.question}"
        Jawaban benar: "${correctAnswerText}".
        Penjelasan: "${currentQ.explanation}"

        Tolong jawab pertanyaan saya dengan bahasa yang SANGAT ramah, sederhana, mudah dimengerti anak ${tingkatSekolahStr}, dan gunakan analogi atau perumpamaan yang dekat dengan dunia anak-anak. Jangan panjang-panjang. Berikan pujian kecil. Gunakan **teks tebal** di bagian kalimat penting jika perlu.
        `;

        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          systemInstruction: {
            parts: [{ text: `Kamu adalah guru ${tingkatSekolahStr} Indonesia yang ramah, penyayang, dan pandai menjelaskan hal rumit menjadi sederhana untuk anak-anak.` }]
          }
        };

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;

        let attempt = 0;
        let success = false;
        let responseText = "";

        while (attempt < 5 && !success) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                     const err = await res.json().catch(() => ({}));
                     throw new Error(err?.error?.message || `Gagal menghubungi AI (Status: ${res.status})`);
                }

                const data = await res.json();
                responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if(responseText) {
                    success = true;
                } else {
                    throw new Error("Respons AI kosong.");
                }

            } catch (e) {
                console.warn(`Gagal memanggil AI, percobaan ${attempt + 1}:`, e.message);
                attempt++;
                if (attempt < 5) {
                    await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000)); 
                }
            }
        }

        if (success) {
            setChatMessages(prev => [...prev, { role: "model", text: responseText }]);
        } else {
            setChatMessages(prev => [...prev, { role: "model", text: "Maaf ya nak, Guru AI sedang sibuk. Pastikan API Key sudah benar atau coba lagi nanti ya! 👓" }]);

              </div>
              <div className="flex-1 h-3 md:h-4 bg-gray-200 rounded-full overflow-hidden relative">
                <div className="h-full bg-green-500 transition-all duration-500" style={{ width: `${((currentQuestionIndex + 1) / questions.length) * 100}%` }} />
              </div>
              <div className={`px-3 md:px-4 py-1.5 md:py-2 rounded-lg md:rounded-xl font-black border text-sm md:text-base ${isDark ? 'bg-indigo-900 text-indigo-200 border-indigo-700' : 'bg-indigo-100 text-indigo-700 border-indigo-200'}`}>
                {currentQuestionIndex + 1}/{questions.length}
              </div>
            </div>

            {showVoiceFeature && (
                <div className={`w-full max-w-4xl lg:max-w-5xl flex flex-col sm:flex-row items-center justify-between gap-3 p-3 md:p-4 mb-6 rounded-2xl border-2 shadow-sm transition-colors ${isDark ? 'bg-slate-800/80 border-slate-700' : 'bg-white/80 border-gray-200 backdrop-blur-sm'}`}>
                   <div className="flex items-center gap-2 w-full sm:w-auto">
                     <span className={`text-xs md:text-sm font-bold opacity-70 ${textMain} flex items-center`}><i className="fas fa-robot mr-1"></i> Suara AI:</span>
                     
                     <select 
                       value={config.voice} 
                       onChange={(e) => setConfig({...config, voice: e.target.value})} 
                       className={`flex-1 sm:w-auto p-2 rounded-xl font-bold text-xs md:text-sm outline-none border-2 cursor-pointer shadow-inner ${inputBg}`}
                     >
                       {voices.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                     </select>
                   </div>

                   {isSpeaking ? (
                     <button onClick={stopSpeaking} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-red-500 text-white px-5 py-2.5 rounded-xl font-bold border-2 border-red-600 shadow-[0_4px_0_0_rgba(220,38,38,1)] active:translate-y-[4px] active:shadow-none hover:bg-red-400 transition-all text-sm md:text-base animate-pulse">
                       <i className="fas fa-square"></i> Berhenti
                     </button>
                   ) : (
                     <button onClick={playPreloadedAudio} disabled={isTtsLoading && config.voice !== 'local'} className={`w-full sm:w-auto flex items-center justify-center gap-2 bg-sky-400 text-white px-6 py-2.5 rounded-xl font-black border-2 border-sky-500 shadow-[0_4px_0_0_rgba(2,132,199,1)] active:translate-y-[4px] active:shadow-none hover:bg-sky-300 transition-all text-sm md:text-base ${(isTtsLoading && config.voice !== 'local') ? 'opacity-50 cursor-not-allowed' : 'animate-bounce'}`}>
                       {(isTtsLoading && config.voice !== 'local') ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-volume-up"></i>} 
                       {(isTtsLoading && config.voice !== 'local') ? "Menyiapkan Suara..." : "Bacakan Soal"}
                     </button>
                   )}
                </div>
            )}

            <div className={`w-full max-w-4xl lg:max-w-5xl rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 lg:p-10 shadow-lg border-2 mb-6 md:mb-8 relative transition-colors ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-100'}`}>
              <div className="flex gap-2 mb-4 md:mb-6 flex-wrap">
                <span className={`px-2 md:px-3 py-1 font-bold rounded-md md:rounded-lg border text-[10px] md:text-xs ${levelColors[currentQ.level] || (isDark ? 'bg-gray-700' : 'bg-gray-100')}`}>{String(currentQ.level)}</span>
                <span className={`px-2 md:px-3 py-1 font-bold rounded-md md:rounded-lg border text-[10px] md:text-xs ${isDark ? 'bg-indigo-900 text-indigo-200' : 'bg-indigo-100 text-indigo-700'}`}>📚 {String(config.subject.split(' (')[0])}</span>
              </div>

              {/* FUNGSI FORMAT BOLD DITERAPKAN DI SOAL */}
              <h2 className={`text-xl md:text-2xl lg:text-3xl font-black mb-6 md:mb-8 leading-relaxed md:leading-snug ${textMain}`}>{formatText(currentQ.question)}</h2>

              {/* FITUR PETUNJUK / KISI-KISI */}
              {!isAnswered && currentQ.hint && (
                <div className="flex flex-col items-center mb-8">
                  <button 
                    onClick={() => setShowHint(!showHint)}
                    className={`px-5 py-2.5 rounded-full font-bold text-sm flex items-center gap-2 transition-all shadow-sm active:scale-95 ${showHint ? (isDark ? 'bg-amber-900/50 text-amber-400 border border-amber-700' : 'bg-amber-100 text-amber-700 border border-amber-300') : (isDark ? 'bg-slate-700 text-slate-300 border border-slate-600 hover:bg-slate-600' : 'bg-slate-100 text-slate-600 border border-slate-300 hover:bg-slate-200')}`}
                  >
                    <i className="fas fa-lightbulb text-amber-500"></i> {showHint ? "Tutup Petunjuk" : "Butuh Petunjuk?"}
                  </button>
                  {showHint && (
                    <div className={`mt-4 p-5 rounded-2xl text-sm font-medium w-full md:w-3/4 text-center border-2 animate-fade-in ${isDark ? 'bg-amber-900/20 border-amber-700/50 text-amber-200' : 'bg-amber-50 border-amber-200 text-amber-800'}`}>
                      {formatText(currentQ.hint)}
                    </div>
                  )}
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 lg:gap-5">
                {currentQ.options.map((opt, idx) => {
                  let btnClass = isDark ? "bg-slate-700 border-slate-600 text-slate-300" : "bg-white border-gray-200 text-gray-700";
                  if (isAnswered) {
                    if (idx === currentQ.correctAnswerIndex) btnClass = "bg-green-500 border-green-600 text-white ring-2 ring-green-300 scale-[1.01] z-10 shadow-md";
                    else if (idx === selectedOption) btnClass = "bg-red-500 border-red-600 text-white opacity-90 scale-[0.98]";
                    else btnClass = "opacity-40 pointer-events-none";
                  }
                  return (
                    <button key={idx} disabled={isAnswered} onClick={() => handleOptionClick(idx)} className={`w-full text-left p-3 md:p-4 rounded-xl border-2 font-bold text-sm md:text-base lg:text-lg transition-all flex items-center justify-between shadow-[0_3px_0_0_rgba(0,0,0,0.1)] ${isAnswered ? '' : 'hover:bg-indigo-50 hover:border-indigo-300 active:translate-y-[2px] active:shadow-none'} ${btnClass}`}>
                      <span className="flex items-center gap-3 md:gap-4">
                        <span className={`w-7 h-7 md:w-8 md:h-8 flex items-center justify-center rounded-lg text-xs md:text-sm font-black shrink-0 ${isAnswered && idx === currentQ.correctAnswerIndex ? 'bg-white text-green-600' : 'bg-black/10'}`}>{['A','B','C','D'][idx]}</span>
                        {/* FUNGSI FORMAT BOLD DITERAPKAN DI OPSI JAWABAN */}
                        <span>{formatText(cleanOptionText(opt))}</span>
                      </span>
                    </button>
                  );
                })}
              </div>

              {/* Feedback & Explanation & Chat AI */}
              {isAnswered && (
                <div className={`mt-5 md:mt-6 p-4 md:p-5 rounded-xl md:rounded-2xl border-2 animate-fade-in-up relative ${isCorrectAnswer ? (isDark ? 'bg-green-900/30 border-green-700' : 'bg-green-50 border-green-200') : (isDark ? 'bg-orange-900/30 border-orange-700' : 'bg-orange-50 border-orange-200')}`}>
                  <div className="flex flex-col md:flex-row gap-3 md:gap-4 pr-2">
                    <div className="flex items-start gap-3">
                      {isCorrectAnswer ? <i className="fas fa-smile text-green-500 shrink-0 animate-bounce text-3xl md:text-4xl mt-1"></i> : <i className="fas fa-lightbulb text-orange-500 shrink-0 text-3xl md:text-4xl mt-1"></i>}
                      <div>
                        <h3 className={`font-black text-lg md:text-xl mb-1 ${isCorrectAnswer ? 'text-green-500' : 'text-orange-500'}`}>{String(feedbackMessage)}</h3>
                        {/* FUNGSI FORMAT BOLD DITERAPKAN DI PENJELASAN */}
                        <p className={`font-medium text-xs md:text-sm ${textSub}`}>{formatText(currentQ.explanation)}</p>
                      </div>
                    </div>

                    {/* Tombol Tanya Guru AI - Hanya muncul jika jawaban salah */}
                    {!isCorrectAnswer && (
                       <button onClick={() => setIsChatOpen(true)} className={`mt-3 md:mt-0 md:ml-auto shrink-0 flex items-center justify-center gap-2 bg-gradient-to-r from-purple-500 to-indigo-500 text-white px-4 py-2 rounded-xl font-bold shadow-md hover:scale-105 transition-transform text-xs md:text-sm`}>
                         <i className="fas fa-magic"></i> Tanya Guru AI ✨
                       </button>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* NAVIGASI KEMBALI DAN LANJUT */}
            <div className="w-full max-w-4xl lg:max-w-5xl flex justify-between pb-10 gap-4">
              <button 
                onClick={handlePrevQuestion} 
                disabled={currentQuestionIndex === 0} 
                className={`bg-slate-500 text-white font-black text-sm md:text-lg px-6 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl transition-all flex items-center justify-center gap-2 flex-1 md:flex-none ${currentQuestionIndex === 0 ? 'opacity-40 cursor-not-allowed border-b-4 border-slate-600' : 'hover:bg-slate-400 active:translate-y-[4px] border-b-4 border-slate-700 active:border-b-0'}`}
              >
                <i className="fas fa-arrow-left md:mr-2"></i> <span className="hidden md:inline">Kembali</span>
              </button>

              {isAnswered && (
                <button onClick={handleNextQuestion} className="bg-indigo-600 text-white font-black text-sm md:text-lg px-8 py-3 md:py-4 rounded-xl md:rounded-2xl transition-all flex items-center justify-center gap-2 flex-[2] md:flex-none animate-bounce border-b-4 border-indigo-800 active:border-b-0 active:translate-y-[4px]">
                  Lanjut <i className="fas fa-arrow-right ml-2"></i>
                </button>
              )}
            </div>
            
            {/* Modal Chat "Tanya Guru AI" */}
            {isChatOpen && (
              <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
                <div className={`chat-modal-enter w-full sm:max-w-md md:max-w-lg lg:max-w-xl h-[85vh] sm:h-[80vh] flex flex-col rounded-t-[2rem] sm:rounded-[2rem] shadow-2xl border-t-4 sm:border-4 ${isDark ? 'bg-slate-800 border-indigo-500' : 'bg-white border-indigo-400'}`}>
                  
                  <div className={`p-4 flex items-center justify-between border-b ${isDark ? 'border-slate-700 bg-slate-800/90 rounded-t-[2rem]' : 'border-gray-100 bg-white/90 rounded-t-[2rem]'}`}>
                     <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white shadow-inner">
                           <i className="fas fa-robot text-xl"></i>
                        </div>
                        <div>
                           <h3 className={`font-black text-base md:text-lg leading-tight ${isDark ? 'text-white' : 'text-gray-800'}`}>Guru AI ✨</h3>
                           <p className={`text-[10px] md:text-xs font-medium ${isDark ? 'text-indigo-300' : 'text-indigo-500'}`}>Siap membantu menjelaskannya padamu!</p>
                        </div>
                     </div>
                     <button onClick={() => setIsChatOpen(false)} className={`w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/10 transition-colors ${isDark ? 'text-gray-300' : 'text-gray-500'}`}>
                        <i className="fas fa-times text-lg"></i>
                     </button>
                  </div>

                  <div className={`flex-1 overflow-y-auto p-4 space-y-4 ${isDark ? 'bg-slate-800' : 'bg-slate-50'}`}>
                     <div className="flex items-end gap-2">
                        <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center shrink-0">
                           <i className="fas fa-robot text-indigo-500 text-sm"></i>
                        </div>
                        <div className={`px-4 py-3 rounded-2xl rounded-bl-none max-w-[85%] text-sm shadow-sm ${isDark ? 'bg-slate-700 text-slate-200' : 'bg-white text-gray-700 border border-gray-100'}`}>
                           Halo! Jangan sedih kalau jawabannya belum tepat. Kamu mau tanya apa tentang soal ini? Kakak siap bantu jelaskan! 😊
                        </div>
                     </div>

                     {chatMessages.map((msg, idx) => (
                        <div key={idx} className={`flex items-end gap-2 ${msg.role === 'user' ? 'justify-end' : ''}`}>
                           {msg.role === 'model' && (
                             <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center shrink-0">
                                <i className="fas fa-robot text-indigo-500 text-sm"></i>
                             </div>
                           )}
                           {/* FUNGSI FORMAT BOLD DITERAPKAN DI PESAN CHAT AI */}
                           <div className={`px-4 py-3 rounded-2xl max-w-[85%] text-sm shadow-sm ${
                             msg.role === 'user' 
                               ? 'bg-indigo-500 text-white rounded-br-none' 
                               : isDark ? 'bg-slate-700 text-slate-200 rounded-bl-none' : 'bg-white text-gray-700 border border-gray-100 rounded-bl-none'
                           }`}>
                              {formatText(msg.text)}
                           </div>
                        </div>
                     ))}
                     
                     {isChatLoading && (
                        <div className="flex items-end gap-2">
                           <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center shrink-0">
                              <i className="fas fa-robot text-indigo-500 text-sm"></i>
                           </div>
                           <div className={`px-4 py-3 rounded-2xl rounded-bl-none max-w-[85%] text-sm shadow-sm flex gap-1 items-center ${isDark ? 'bg-slate-700' : 'bg-white border border-gray-100'}`}>
                              <i className="fas fa-circle-notch fa-spin text-indigo-500 text-xs mr-2"></i> Mengetik...
                           </div>
                        </div>
                     )}
                     <div ref={chatEndRef} />
                  </div>

                  <div className={`p-3 sm:p-4 border-t ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-100'}`}>
                     <div className="flex gap-2">
                        <input 
                          type="text" 
                          value={chatInput}
                          onChange={(e) => setChatInput(e.target.value)}
                          onKeyDown={(e) => e.key === 'Enter' && handleAskAI()}
                          placeholder="Ketik pertanyaanmu di sini..."
                          disabled={isChatLoading}
                          className={`flex-1 px-4 py-3 rounded-xl outline-none border transition-colors text-sm ${isDark ? 'bg-slate-700 border-slate-600 text-white focus:border-indigo-500' : 'bg-slate-50 border-gray-200 text-gray-800 focus:border-indigo-400 focus:bg-white'}`}
                        />
                        <button 
                          onClick={handleAskAI}
                          disabled={isChatLoading || !chatInput.trim()}
                          className={`px-4 py-3 flex items-center justify-center rounded-xl font-bold shadow-md transition-all ${!chatInput.trim() || isChatLoading ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-indigo-500 text-white hover:bg-indigo-600 hover:scale-105 active:scale-95'}`}
                        >
                          Kirim
                        </button>
                     </div>
                  </div>

                </div>
              </div>
            )}

          </div>
        );
      }

      if (gameState === 'result') {
        return (
          <div className={`min-h-screen flex flex-col items-center justify-center p-4 pt-20 ${isDark ? 'bg-slate-900' : 'bg-gradient-to-br from-indigo-500 to-purple-600'}`}>
            <div className="w-full max-w-md md:max-w-2xl lg:max-w-5xl flex justify-end mb-4">
              <HeaderControls />
            </div>
            <div className={`max-w-md w-full rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 text-center relative shadow-2xl ${isDark ? 'bg-slate-800 border-slate-600' : 'bg-white'}`}>
              <i className="fas fa-trophy text-6xl md:text-7xl block mx-auto text-yellow-400 mb-4 animate-bounce"></i>
              <h2 className={`text-2xl md:text-3xl font-black mb-2 ${isDark ? 'text-white' : 'text-gray-800'}`}>Misi Selesai!</h2>
              <div className={`text-5xl md:text-6xl lg:text-7xl font-black mb-4 ${isDark ? 'text-green-400' : 'text-indigo-600'}`}>
                {score}<span className="text-xl md:text-2xl text-gray-400">/{questions.length}</span>
              </div>
              <button onClick={backToHome} className="w-full font-bold py-3 md:py-4 rounded-xl md:rounded-2xl border-b-4 flex items-center justify-center gap-2 transition-all text-sm md:text-base bg-indigo-500 hover:bg-indigo-400 border-indigo-700 active:border-b-0 active:translate-y-[4px] text-white">
                <i className="fas fa-sync-alt text-lg md:text-xl"></i> Main Dari Awal
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'error') {
        return (
          <div className={`min-h-screen flex flex-col items-center justify-center p-4 pt-20 ${isDark ? 'bg-slate-900 text-white' : 'bg-rose-50'}`}>
            <div className="w-full max-w-md md:max-w-2xl lg:max-w-5xl flex justify-end mb-4">
              <HeaderControls />
            </div>
            <div className={`p-8 md:p-10 rounded-[2rem] shadow-2xl max-w-md w-full text-center border-2 ${isDark ? 'bg-slate-800 border-slate-600' : 'bg-white border-rose-100'}`}>
              <div className="bg-rose-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-frown text-4xl text-rose-500"></i></div>
              <h2 className="text-xl font-black mb-2">Ups, Ada yang salah!</h2>
              <div className="p-4 rounded-xl text-left border bg-rose-50 border-rose-200 mb-6"><p className="font-mono text-xs text-rose-600">{String(errorMessage)}</p></div>
              <button onClick={backToHome} className="w-full font-bold py-3 md:py-4 rounded-xl md:rounded-2xl border-b-4 flex items-center justify-center gap-2 transition-all text-sm md:text-base bg-indigo-500 hover:bg-indigo-400 border-indigo-700 active:border-b-0 active:translate-y-[4px] text-white">Kembali ke Markas</button>
            </div>
          </div>
        );
      }
      
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- SCRIPT UNTUK MENGAKTIFKAN SERVICE WORKER PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker PWA berhasil didaftarkan!', registration.scope);
        }).catch(err => {
          console.log('ServiceWorker PWA gagal didaftarkan: ', err);
        });
      });
    }
  </script>
</body>
</html>
